<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCalendar - 个人时间管理</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="nav-left">
            <h1 class="logo">📅 MyCalendar</h1>
        </div>
        <div class="nav-center">
            <button class="btn btn-nav" id="prevBtn">← Last</button>
            <button class="btn btn-nav" id="todayBtn">Today</button>
            <button class="btn btn-nav" id="nextBtn">Next →</button>
            <span class="date-range" id="dateRange">2026/03/30 - 04/05</span>
        </div>
        <div class="nav-right">
            <div class="view-switcher">
                <button class="btn btn-view active" data-view="week">周</button>
                <button class="btn btn-view" data-view="month">月</button>
                <button class="btn btn-view" data-view="year">年</button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <!-- 周视图 -->
        <div class="view-container active" id="weekView">
            <div class="week-wrapper">
                <div class="time-column">
                    <div class="time-header">时间</div>
                    <div class="time-slots" id="timeSlots"></div>
                </div>
                <div class="calendar-grid">
                    <div class="days-header" id="daysHeader"></div>
                    <div class="days-grid-wrapper">
                        <div class="days-grid" id="daysGrid"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 月视图 -->
        <div class="view-container" id="monthView">
            <div class="month-header">
                <h2 id="monthTitle">2026年 3月</h2>
            </div>
            <div class="month-calendar" id="monthCalendar"></div>
        </div>

        <!-- 年视图 -->
        <div class="view-container" id="yearView">
            <div class="year-header">
                <h2>2026年概览</h2>
            </div>
            <div class="year-calendar" id="yearCalendar"></div>
        </div>

        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <h3>分类</h3>
                <div class="category-list" id="categoryList"></div>
            </div>

            <div class="sidebar-section">
                <h3>今日任务</h3>
                <div class="today-tasks" id="todayTasks"></div>
            </div>

            <div class="sidebar-section" id="goalsSection" style="display: none;">
                <h3>重要目标 <button class="btn-icon" id="addGoalBtn" title="添加目标">+</button></h3>
                <div class="goals-list" id="goalsList"></div>
            </div>

            <div class="sidebar-section">
                <button class="btn btn-primary btn-block" id="addEventBtn">+ 添加事件</button>
                <button class="btn btn-secondary btn-block" id="analyticsBtn">📊 生成统计</button>
            </div>
        </aside>
    </div>

    <!-- 事件编辑弹窗 -->
    <div class="modal" id="eventModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新建事件</h2>
                <button class="btn-close" id="closeEventModal">&times;</button>
            </div>
            <form id="eventForm" class="event-form">
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" id="eventTitle" placeholder="输入事件标题" required maxlength="100">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>日期 *</label>
                        <div class="date-picker-wrapper">
                            <input type="text" id="eventDate" class="date-input" placeholder="请选择日期" readonly required>
                            <div class="date-picker hidden" id="datePicker">
                                <div class="picker-header">
                                    <button type="button" class="picker-btn" id="prevMonthBtn">&lt;</button>
                                    <span id="pickerMonth"></span>
                                    <button type="button" class="picker-btn" id="nextMonthBtn">&gt;</button>
                                </div>
                                <div class="picker-weekdays">
                                    <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
                                </div>
                                <div class="picker-grid" id="pickerGrid"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>开始时间 *</label>
                        <input type="time" id="eventStartTime" required>
                    </div>
                    <div class="form-group">
                        <label>结束时间 *</label>
                        <input type="time" id="eventEndTime" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>持续时长</label>
                    <input type="text" id="eventDuration" placeholder="自动计算" disabled>
                </div>

                <div class="form-group">
                    <label>分类 *</label>
                    <select id="eventCategory" required>
                        <option value="">-- 选择分类 --</option>
                        <option value="business">事业</option>
                        <option value="project">项目</option>
                        <option value="study">学习</option>
                        <option value="leisure">娱乐</option>
                        <option value="health">健康</option>
                        <option value="personal">个人</option>
                        <option value="reading">阅读/新闻</option>
                        <option value="meeting">会议</option>
                        <option value="social">社交</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>地点</label>
                    <input type="text" id="eventLocation" placeholder="输入地点（支持谷歌地图导航）">
                </div>

                <div class="form-group">
                    <label>视频会议链接</label>
                    <input type="url" id="eventMeetingLink" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label>备注</label>
                    <textarea id="eventNotes" placeholder="输入备注信息" maxlength="500"></textarea>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="eventIsGoal">
                        标记为重要目标
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <button type="button" class="btn btn-danger" id="deleteEventBtn" style="display: none;">删除</button>
                    <button type="button" class="btn btn-secondary" id="cancelEventBtn">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 目标编辑弹窗 -->
    <div class="modal" id="goalModal">
        <div class="modal-overlay" id="goalOverlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>编辑重要目标</h2>
                <button class="btn-close" id="closeGoalModal">&times;</button>
            </div>
            <form id="goalForm" class="goal-form">
                <div class="form-group">
                    <label>目标标题 *</label>
                    <input type="text" id="goalTitle" placeholder="输入目标标题" required maxlength="50">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>开始日期</label>
                        <input type="date" id="goalStartDate">
                    </div>
                    <div class="form-group">
                        <label>结束日期</label>
                        <input type="date" id="goalEndDate">
                    </div>
                </div>

                <div class="form-group">
                    <label>分类 *</label>
                    <select id="goalCategory" required>
                        <option value="business">事业</option>
                        <option value="project">项目</option>
                        <option value="study">学习</option>
                        <option value="leisure">娱乐</option>
                        <option value="health">健康</option>
                        <option value="personal">个人</option>
                        <option value="reading">阅读/新闻</option>
                        <option value="meeting">会议</option>
                        <option value="social">社交</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <button type="button" class="btn btn-danger" id="deleteGoalBtn" style="display: none;">删除</button>
                    <button type="button" class="btn btn-secondary" id="cancelGoalBtn">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 统计分析弹窗 -->
    <div class="modal" id="analyticsModal">
        <div class="modal-overlay" id="analyticsOverlay"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>时间分析统计</h2>
                <button class="btn-close" id="closeAnalyticsModal">&times;</button>
            </div>
            <div class="analytics-content">
                <div class="analytics-tabs">
                    <button class="tab-btn active" data-period="week">周统计</button>
                    <button class="tab-btn" data-period="month">月统计</button>
                </div>

                <div class="analytics-grid">
                    <div class="stat-card">
                        <h3>总时长</h3>
                        <div class="stat-value" id="totalHours">0h</div>
                    </div>

                    <div class="stat-card">
                        <h3>分类分布</h3>
                        <div id="categoryStats"></div>
                    </div>
                </div>

                <div class="stat-card full-width">
                    <h3>分类时间排行</h3>
                    <div id="categoryRanking"></div>
                </div>

                <div class="stat-card full-width" id="ganttContainer" style="display: none;">
                    <h3>重要目标甘特图</h3>
                    <div class="gantt-chart" id="ganttChart"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
